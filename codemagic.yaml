# Codemagic CI/CD Configuration for Unity project
# Reference: https://docs.codemagic.io/configuration-yaml/unity/

workflows:
  unity-ios:
    name: Unity iOS IPA Build
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      unity: 6000.3.10f1
      groups:
        - unity_credentials # Define BUNDLE_ID, and UNITY_LICENSE (or credentials/serial) here
      vars:
        XCODE_SCHEME: "Unity-iPhone"
        UNITY_IOS_DIR: "build/ios"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
          include: true
          source: true
    scripts:
      - name: Activate Unity License
        script: |
          if [ -n "$UNITY_LICENSE" ]; then
            echo "Activating using UNITY_LICENSE (.ulf file)..."
            sudo mkdir -p "/Library/Application Support/Unity"
            echo "$UNITY_LICENSE" | sudo tee "/Library/Application Support/Unity/Unity_lic.ulf"
          elif [ -n "$UNITY_SERIAL" ]; then
            echo "Activating using UNITY_SERIAL..."
            $UNITY_HOME/Contents/MacOS/Unity \
              -batchmode \
              -quit \
              -logFile \
              -serial "$UNITY_SERIAL" \
              -username "$UNITY_EMAIL" \
              -password "$UNITY_PASSWORD"
          else
            echo "Error: Neither UNITY_LICENSE nor UNITY_SERIAL is defined!"
            exit 1
          fi
      - name: Build Unity iOS Xcode Project
        script: |
          $UNITY_HOME/Contents/MacOS/Unity \
            -batchmode \
            -quit \
            -logFile \
            -projectPath . \
            -executeMethod BuildScript.BuildIOS \
            -nographics \
            -buildTarget iOS
      - name: Initialize Keychain
        script: |
          keychain initialize
      - name: Fetch Signing Files
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_STORE --create
      - name: Set up Xcode Code Signing
        script: |
          xcode-project use-profiles
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project "$UNITY_IOS_DIR/Unity-iPhone.xcodeproj" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      scripts:
        - name: Deactivate Unity License
          script: |
            if [ -n "$UNITY_SERIAL" ]; then
              echo "Returning Unity Pro license..."
              $UNITY_HOME/Contents/MacOS/Unity \
                -quit \
                -batchmode \
                -returnlicense \
                -username "$UNITY_EMAIL" \
                -password "$UNITY_PASSWORD"
            else
              echo "Using Personal license, no license return necessary."
            fi

  unity-android:
    name: Unity Android Build
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      unity: 6000.3.10f1
      groups:
        - unity_credentials
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
          include: true
          source: true
    scripts:
      - name: Activate Unity License
        script: |
          if [ -n "$UNITY_LICENSE" ]; then
            echo "Activating using UNITY_LICENSE (.ulf file)..."
            sudo mkdir -p "/Library/Application Support/Unity"
            echo "$UNITY_LICENSE" | sudo tee "/Library/Application Support/Unity/Unity_lic.ulf"
          elif [ -n "$UNITY_SERIAL" ]; then
            echo "Activating using UNITY_SERIAL..."
            $UNITY_HOME/Contents/MacOS/Unity \
              -batchmode \
              -quit \
              -logFile \
              -serial "$UNITY_SERIAL" \
              -username "$UNITY_EMAIL" \
              -password "$UNITY_PASSWORD"
          else
            echo "Error: Neither UNITY_LICENSE nor UNITY_SERIAL is defined!"
            exit 1
          fi
      - name: Build Android APK
        script: |
          $UNITY_HOME/Contents/MacOS/Unity \
            -batchmode \
            -quit \
            -logFile \
            -projectPath . \
            -executeMethod BuildScript.BuildAndroid \
            -nographics \
            -buildTarget Android
    artifacts:
      - build/android/*.apk
    publishing:
      scripts:
        - name: Deactivate Unity License
          script: |
            if [ -n "$UNITY_SERIAL" ]; then
              echo "Returning Unity Pro license..."
              $UNITY_HOME/Contents/MacOS/Unity \
                -quit \
                -batchmode \
                -returnlicense \
                -username "$UNITY_EMAIL" \
                -password "$UNITY_PASSWORD"
            else
              echo "Using Personal license, no license return necessary."
            fi

  generate-license-request:
    name: Generate Unity License Request (.alf)
    max_build_duration: 10
    instance_type: mac_mini_m2
    environment:
      unity: 6000.3.10f1
    scripts:
      - name: Generate ALF File
        script: |
          $UNITY_HOME/Contents/MacOS/Unity -batchmode -quit -logFile -createManualActivationFile
      - name: Prepare Artifact
        script: |
          mkdir -p build
          mv *.alf build/ || true
    artifacts:
      - build/*.alf
